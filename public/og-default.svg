    <circle cx="32" cy="32" r="9" fill="#fff"/>
    <text x="84" y="30" font-size="26" font-weight="700" fill="#171d3d">Cristen Joy</text>
    <text x="84" y="56" font-size="18" font-weight="500" fill="#9aa2c4">AI Automation</text>
  </g>

  <text x="96" y="330" font-size="68" font-weight="700" fill="#171d3d" letter-spacing="-1.5">Cristen Joy Dimaguila</text>
