  <text x="96" y="470" font-size="26" font-weight="500" fill="#4a5279">Practical workflows with n8n, Apps Script, and AI.</text>

  <g transform="translate(96, 524)" font-size="20" font-weight="600">
    <rect width="190" height="48" rx="12" fill="#e9edfd"/>
    <text x="24" y="31" fill="#5871e6">AI Chatbots</text>
    <rect x="206" width="210" height="48" rx="12" fill="#ddf6ec"/>
    <text x="230" y="31" fill="#1fa37c">Workflow Automation</text>
